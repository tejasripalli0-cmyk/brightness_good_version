<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brightness Control</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>☀️ Brightness Control</h1>

        <input
            type="range"
            id="brightnessSlider"
            min="0"
            max="100"
            value="100"
        >

        <p id="brightnessValue">Brightness: 100%</p>

        <div id="previewBox">
            Preview Area
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
